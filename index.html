<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Quicksave</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Project Quicksave</h1>
        <p>Unlock and decrypt Euro Truck Simulator 2 save files</p>
      </header>
      
      <main>
        <div class="drop-zone" id="drop-zone">
          <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
          </svg>
          <h2>Drag & Drop your .sii file here</h2>
          <p>or click to browse files</p>
          <input type="file" id="file-input" accept=".sii" />
        </div>

        <div class="loading" id="loading" style="display: none;">
          <div class="spinner"></div>
          <p>Decrypting your save file...</p>
        </div>

        <div class="preview-container" id="preview-container" style="display: none;">
          <div class="preview-header">
            <h3>Decrypted Preview</h3>
            <button id="download-btn" class="btn primary">Save Decrypted File</button>
          </div>
          <pre id="preview-content"></pre>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
